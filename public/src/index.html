<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <link rel="icon" href="../img/favicon/favicon-32x32.png" alt="Icon-Apps">
  <title>IT Helpdesk Assistant (Chatbot)</title>

  <meta name="description" content="Sistem IT Helpdesk Assistant (Chatbot) PT. MEJIKU DIGITAL diyakini dapat membantu pengguna menyelesaikan masalah teknis secara mandiri melalui panduan otomatis sebelum diteruskan ke divisi IT untuk penanganan lanjutan seperti perbaikan perangkat, jaringan, maupun aplikasi internal perusahaan.">
  <meta name="keywords" content="MEJIKU DIGITAL, internal, IT Helpdesk Assistant, IT support perusahaan, helpdesk system, troubleshooting IT, dukungan teknis internal, sistem IT perusahaan">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>
      <img class="icons logo" src="../img/favicon/logo-apps.png" alt="logo-apps">
      IT Helpdesk Assistant (Chatbot)
    </h1>

    <div id="chat-box" class="chat-box"></div>

    <div class="chat-input-wrapper">
      <form id="chat-form">
        <textarea
          id="user-input"
          placeholder="Jelaskan kendala teknis Anda..."
          autocomplete="off"
          rows="1"
          required
        ></textarea>

        <button type="submit">
          Kirim
          <img class="icons submit" src="../img/others/submit.png" alt="submit">
        </button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
